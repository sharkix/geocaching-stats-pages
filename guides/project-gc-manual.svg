<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="36" fill="#0E1C10"/>
  <rect x="48" y="48" width="1104" height="624" rx="28" fill="#15271A" stroke="#2B6035" stroke-width="2"/>
  <rect x="48" y="48" width="1104" height="76" rx="28" fill="#112814"/>
  <circle cx="92" cy="86" r="10" fill="#5FAE5D"/>
  <circle cx="124" cy="86" r="10" fill="#F7C64A"/>
  <circle cx="156" cy="86" r="10" fill="#EA6A55"/>
  <text x="192" y="96" fill="#EAF4E7" font-family="Arial, sans-serif" font-size="30" font-weight="700">Project-GC Virtual GPS</text>

  <rect x="92" y="164" width="280" height="448" rx="24" fill="#102115" stroke="#2B6035"/>
  <text x="128" y="214" fill="#6AC16F" font-family="Arial, sans-serif" font-size="26" font-weight="700">Guide Flow</text>
  <rect x="124" y="248" width="216" height="54" rx="16" fill="#2A5D35"/>
  <text x="158" y="283" fill="#F2F8EF" font-family="Arial, sans-serif" font-size="24" font-weight="700">1. Paste GC codes</text>
  <rect x="124" y="322" width="216" height="54" rx="16" fill="#1C3622"/>
  <text x="154" y="357" fill="#D7E6D7" font-family="Arial, sans-serif" font-size="22">2. Manage list</text>
  <rect x="124" y="396" width="216" height="54" rx="16" fill="#1C3622"/>
  <text x="154" y="431" fill="#D7E6D7" font-family="Arial, sans-serif" font-size="22">3. Add section</text>
  <rect x="124" y="470" width="216" height="54" rx="16" fill="#1C3622"/>
  <text x="154" y="505" fill="#D7E6D7" font-family="Arial, sans-serif" font-size="22">4. Export GPX</text>

  <rect x="412" y="164" width="676" height="448" rx="28" fill="#0F1912" stroke="#2A5D35"/>
  <text x="458" y="220" fill="#EFF7EC" font-family="Arial, sans-serif" font-size="34" font-weight="700">Bulk add missing-code list</text>
  <text x="458" y="258" fill="#A9C8AA" font-family="Arial, sans-serif" font-size="22">Use the copied codes from GeoStats, separated by spaces.</text>

  <rect x="458" y="294" width="582" height="110" rx="20" fill="#15251A" stroke="#3C7F45" stroke-width="2" stroke-dasharray="10 10"/>
  <text x="490" y="338" fill="#E8F4E6" font-family="Courier New, monospace" font-size="22">GC12345 GC67890 GCAAAAA GCBBBBB GCCCCCC</text>
  <text x="490" y="372" fill="#E8F4E6" font-family="Courier New, monospace" font-size="22">GCDDDDD GCEEEEE GCF1234 GCG5678 GCH9999</text>

  <rect x="458" y="434" width="182" height="60" rx="18" fill="#2D8A47"/>
  <text x="492" y="472" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="26" font-weight="700">Manage list</text>
  <rect x="664" y="434" width="182" height="60" rx="18" fill="#E1A92A"/>
  <text x="703" y="472" fill="#1B1B1B" font-family="Arial, sans-serif" font-size="26" font-weight="700">Add section</text>
  <rect x="870" y="434" width="170" height="60" rx="18" fill="#2D6CCA"/>
  <text x="918" y="472" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="26" font-weight="700">Build GPX</text>

  <text x="458" y="548" fill="#DDEBDA" font-family="Arial, sans-serif" font-size="24">Tip: if you need corrected coordinates, keep the export in GPX and enable corrected coords if Project-GC offers it.</text>
</svg>
