<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="boxGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#005f32"/>
      <stop offset="100%" stop-color="#02874a"/>
    </linearGradient>
  </defs>
  
  <!-- Geocache box -->
  <rect x="6" y="18" width="36" height="26" rx="4" fill="url(#boxGradient)"/>
  
  <!-- Box lid -->
  <rect x="4" y="12" width="40" height="10" rx="3" fill="#02874a"/>
  <rect x="8" y="14" width="32" height="2" fill="#4caf50" opacity="0.4"/>
  
  <!-- Location pin / stats indicator -->
  <circle cx="24" cy="32" r="8" fill="#f9a825"/>
  <circle cx="24" cy="32" r="4" fill="#02874a"/>
  
  <!-- Mini chart bars on top -->
  <rect x="12" y="4" width="4" height="6" rx="1" fill="#4caf50"/>
  <rect x="18" y="2" width="4" height="8" rx="1" fill="#02874a"/>
  <rect x="24" y="5" width="4" height="5" rx="1" fill="#4caf50"/>
  <rect x="30" y="3" width="4" height="7" rx="1" fill="#02874a"/>
</svg>
