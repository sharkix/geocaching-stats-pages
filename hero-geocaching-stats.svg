<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#6d4c41"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#skyGrad)"/>
  
  <!-- Distant hills -->
  <ellipse cx="200" cy="320" rx="250" ry="80" fill="#81c784" opacity="0.6"/>
  <ellipse cx="600" cy="310" rx="300" ry="90" fill="#66bb6a" opacity="0.5"/>
  
  <!-- Ground -->
  <path d="M0 280 Q200 260 400 280 T800 270 L800 400 L0 400 Z" fill="url(#groundGrad)"/>
  
  <!-- Trail path -->
  <path d="M-20 350 Q100 320 200 340 Q300 360 400 330 Q500 300 600 320 Q700 340 820 310" 
        stroke="url(#pathGrad)" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Trees -->
  <g filter="url(#shadow)">
    <!-- Tree 1 -->
    <rect x="80" y="240" width="12" height="60" fill="#5d4037"/>
    <polygon points="86,160 40,240 132,240" fill="#2e7d32"/>
    <polygon points="86,190 50,250 122,250" fill="#388e3c"/>
    
    <!-- Tree 2 -->
    <rect x="680" y="220" width="16" height="70" fill="#5d4037"/>
    <polygon points="688,130 630,220 746,220" fill="#2e7d32"/>
    <polygon points="688,165 645,235 731,235" fill="#388e3c"/>
    
    <!-- Tree 3 (smaller) -->
    <rect x="160" y="260" width="8" height="40" fill="#5d4037"/>
    <polygon points="164,200 135,260 193,260" fill="#43a047"/>
  </g>
  
  <!-- Cache box (main focus) -->
  <g filter="url(#shadow)" transform="translate(340, 200)">
    <!-- Box body -->
    <rect x="0" y="20" width="120" height="80" rx="8" fill="url(#boxGrad)"/>
    <!-- Box lid -->
    <rect x="-5" y="0" width="130" height="25" rx="4" fill="#43a047"/>
    <!-- Box stripe -->
    <rect x="10" y="35" width="100" height="8" fill="#fff" opacity="0.3"/>
    <!-- Lock icon -->
    <circle cx="60" cy="70" r="12" fill="#ffeb3b"/>
    <rect x="54" y="58" width="12" height="16" rx="2" fill="#ffc107"/>
    <path d="M55 66 Q60 56 65 66" stroke="#795548" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Stats chart floating -->
  <g filter="url(#shadow)" transform="translate(520, 80)">
    <rect x="0" y="0" width="160" height="100" rx="8" fill="white" opacity="0.95"/>
    <!-- Chart bars -->
    <rect x="20" y="60" width="20" height="30" rx="2" fill="#4caf50"/>
    <rect x="50" y="40" width="20" height="50" rx="2" fill="#66bb6a"/>
    <rect x="80" y="25" width="20" height="65" rx="2" fill="#81c784"/>
    <rect x="110" y="50" width="20" height="40" rx="2" fill="#a5d6a7"/>
    <!-- Chart line -->
    <path d="M25 55 L55 35 L85 20 L115 45" stroke="#2e7d32" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="25" cy="55" r="4" fill="#2e7d32"/>
    <circle cx="55" cy="35" r="4" fill="#2e7d32"/>
    <circle cx="85" cy="20" r="4" fill="#2e7d32"/>
    <circle cx="115" cy="45" r="4" fill="#2e7d32"/>
  </g>
  
  <!-- Calendar icon floating -->
  <g filter="url(#shadow)" transform="translate(100, 100)">
    <rect x="0" y="0" width="90" height="80" rx="6" fill="white" opacity="0.95"/>
    <rect x="0" y="0" width="90" height="22" rx="6" fill="#e53935"/>
    <rect x="0" y="16" width="90" height="6" fill="#e53935"/>
    <!-- Calendar grid -->
    <g fill="#424242" font-size="10" font-family="sans-serif" text-anchor="middle">
      <text x="20" y="42">1</text>
      <text x="45" y="42">2</text>
      <text x="70" y="42">3</text>
      <text x="20" y="58">4</text>
      <circle cx="45" cy="54" r="9" fill="#4caf50"/>
      <text x="45" y="58" fill="white" font-weight="bold">5</text>
      <text x="70" y="58">6</text>
      <text x="20" y="74">7</text>
      <text x="45" y="74">8</text>
      <text x="70" y="74">9</text>
    </g>
  </g>
  
  <!-- D/T matrix floating -->
  <g filter="url(#shadow)" transform="translate(220, 60)">
    <rect x="0" y="0" width="80" height="70" rx="6" fill="white" opacity="0.95"/>
    <!-- Grid -->
    <g stroke="#e0e0e0" stroke-width="1">
      <line x1="20" y1="15" x2="20" y2="65"/>
      <line x1="40" y1="15" x2="40" y2="65"/>
      <line x1="60" y1="15" x2="60" y2="65"/>
      <line x1="5" y1="27" x2="75" y2="27"/>
      <line x1="5" y1="40" x2="75" y2="40"/>
      <line x1="5" y1="53" x2="75" y2="53"/>
    </g>
    <!-- Filled cells -->
    <rect x="21" y="28" width="18" height="11" fill="#4caf50" opacity="0.8"/>
    <rect x="41" y="41" width="18" height="11" fill="#4caf50" opacity="0.6"/>
    <rect x="1" y="54" width="18" height="10" fill="#4caf50" opacity="0.4"/>
    <rect x="61" y="16" width="13" height="10" fill="#4caf50" opacity="0.9"/>
  </g>
  
  <!-- Location markers -->
  <g fill="#e53935">
    <path d="M250 290 L250 270 L260 280 Z"/>
    <circle cx="250" cy="265" r="8"/>
    <circle cx="250" cy="265" r="3" fill="white"/>
  </g>
  <g fill="#2196f3">
    <path d="M550 310 L550 290 L560 300 Z"/>
    <circle cx="550" cy="285" r="8"/>
    <circle cx="550" cy="285" r="3" fill="white"/>
  </g>
  
  <!-- Compass rose (small) -->
  <g transform="translate(720, 320)">
    <circle cx="0" cy="0" r="25" fill="white" opacity="0.9" filter="url(#shadow)"/>
    <polygon points="0,-18 4,-4 0,0 -4,-4" fill="#e53935"/>
    <polygon points="0,18 4,4 0,0 -4,4" fill="#424242"/>
    <polygon points="-18,0 -4,4 0,0 -4,-4" fill="#757575"/>
    <polygon points="18,0 4,4 0,0 4,-4" fill="#757575"/>
    <circle cx="0" cy="0" r="4" fill="#ffc107"/>
  </g>
  
  <!-- Decorative clouds -->
  <g fill="white" opacity="0.8">
    <ellipse cx="150" cy="50" rx="40" ry="20"/>
    <ellipse cx="180" cy="45" rx="30" ry="18"/>
    <ellipse cx="130" cy="55" rx="25" ry="12"/>
    
    <ellipse cx="650" cy="70" rx="35" ry="18"/>
    <ellipse cx="680" cy="65" rx="28" ry="15"/>
    <ellipse cx="625" cy="75" rx="22" ry="10"/>
  </g>
</svg>
