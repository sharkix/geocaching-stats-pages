<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50">
  <defs>
    <linearGradient id="barGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#02874a"/>
      <stop offset="100%" stop-color="#4caf50"/>
    </linearGradient>
  </defs>
  
  <!-- Geocache box icon -->
  <g transform="translate(5, 5)">
    <!-- Box base -->
    <rect x="2" y="15" width="36" height="25" rx="3" fill="#02874a"/>
    <!-- Box lid -->
    <rect x="0" y="10" width="40" height="8" rx="2" fill="#005f32"/>
    <!-- Box highlight -->
    <rect x="5" y="18" width="30" height="3" fill="#4caf50" opacity="0.5"/>
    <!-- Location pin on box -->
    <circle cx="20" cy="28" r="6" fill="#f9a825"/>
    <circle cx="20" cy="28" r="3" fill="#02874a"/>
  </g>
  
  <!-- Stats bars -->
  <g transform="translate(50, 10)">
    <rect x="0" y="20" width="8" height="20" rx="2" fill="url(#barGradient)"/>
    <rect x="12" y="12" width="8" height="28" rx="2" fill="url(#barGradient)"/>
    <rect x="24" y="5" width="8" height="35" rx="2" fill="url(#barGradient)"/>
    <rect x="36" y="15" width="8" height="25" rx="2" fill="url(#barGradient)"/>
  </g>
  
  <!-- Text: GeoStats -->
  <text x="100" y="35" font-family="Avenir Next, Segoe UI, sans-serif" font-size="22" font-weight="600" fill="#02874a">
    GeoStats
  </text>
</svg>
